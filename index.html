<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title> Проекты 10В класса </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .project-btn {
            background: #1e293b;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .project-btn:hover {
            background: #3b82f6;
            transform: scale(1.02);
        }
        
        
        .detail-page {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .back-btn {
            background: #475569;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .back-btn:hover {
            background: #1e293b;
        }
        .photo, .video-container {
            text-align: center;
            margin: 20px 0;
        }
        .photo img {
            max-width: 100%;
            border-radius: 16px;
            max-height: 300px;
        }
        .video-container video {
            max-width: 100%;
            border-radius: 16px;
            max-height: 300px;
            background: #000;
        }
        .info-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 16px;
            margin: 15px 0;
            line-height: 1.5;
        }
        .link-btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            margin: 10px 10px 10px 0;
        }
        .pdf-btn {
            display: inline-block;
            background: #dc2626;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            margin: 10px 10px 10px 0;
        }
        .pdf-btn:hover {
            background: #b91c1c;
        }
        .buttons-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        h1 {
            text-align: center;
            color: #0f172a;
        }
        .sub {
            text-align: center;
            color: #475569;
            margin-bottom: 30px;
        }
        .media-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 5px;
        }
        .repo-btn {
    display: inline-block;
    background: #10b981;
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 30px;
    margin: 10px 10px 10px 0;
    font-size: 14px;
}
        .repo-btn:hover {
    background: #059669;
}

        .presentation-btn {
    display: inline-block;
    background: #f59e0b;
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 30px;
    margin: 10px 10px 10px 0;
    font-size: 14px;
}
        .presentation-btn:hover {
    background: #d97706;
}
        
    </style>
</head>
<body>
<div class="container">
   
    <div id="mainScreen">
        <h1>Проекты 10В класса 2025/26 года</h1>
        <div class="sub">Выбери проект, который хочешь посмотреть!</div>
        <div class="grid" id="buttonsGrid"></div>
    </div>

    
    <div id="projectScreen" style="display:none;">
        <div class="detail-page">
            <button class="back-btn" onclick="showMain()">Назад ко всем проектам</button>
            <div id="projectContent"></div>
        </div>
    </div>
</div>

        { num:5, title:"ТГ бот для подсчета калорий", author:"Геворкян Баграт, Овсянников Андрей", info:"Проект представляет собой Telegram-бота для упрощения контроля питания. Пользователь вводит описание еды или отправляет фотографию, после чего бот определяет продукты, оценивает их количество и рассчитывает общую калорийность.", link:"https://t.me/CalorieAI192_Bot?authuser=0", photo:"", video:"", pdf:"" , repository: "https://github.com/teawlue/CalorieAI-Bot", presentation: ""},
        
        { num:6, title:"Геометрия? Разберем!", author:"Донская Анна", info:"Этот сайт создан для тех, кто хочет систематизировать знания по геометрии, готовится к экзаменам, ищет понятный и структурированный теоретический материал или желает проверить и укрепить свои знания по определённой теме.", link:"https://ankadon.github.io/school_project/", photo:"", video:"", pdf:"", repository: "https://github.com/AnkaDon/school_project", presentation: "" },

        { num:9, title:"Программный интерфейс Анализ движений мыши", author:"Китаев Никита, Сухинин Юрий", info:"Целью настоящего проекта является создание графического интерфейса для удобства использования программы анализа поведения мыши.", link:"", photo:"", video:"", pdf:"" , repository: "https://drive.google.com/drive/folders/10pqA42N6f-50cCS9gHewRs8GGHKoZZhG", presentation: ""},
        
        { num:10, title:"MiceDB", author:"Ковалев Степан, Рожок Владимир", info:"Новая база данных и визуальный интерфейс, оформленный в виде сайта, для лаборатории Института Проблем Передачи Информации РАН.", link:"", photo:"", video:"", pdf:"", repository: "https://github.com/DaregonPL/ippi_micedb", presentation: "" },
        
        { num:11, title:"Вера. Надежда. Любовь", author:"Коваленко Василиса", info:"создание костюмов одежды женского гардероба для посещения праздничных православных служб.", link:"", photo:"", video:"", pdf:"", repository: "", presentation: "" },
        
        { num:12, title:"", author:"Копцев Петр", info:"", link:"", photo:"", video:"", pdf:"", repository: "", presentation: "" },
        
        { num:13, title:"Влияние социальных сетей на современное общество", author:"Красненкова Полина, Лубенец Дарья", info:"Анализ влияния социальных сетей на жизнь современного общества для выработки рекомендаций по минимизации негативных последствий.", link:"https://docs.google.com/forms/d/1rPIksMdLm316Ki4oE3o2JVTpt8O6MVNKayNwZxNN92Y/edit", photo:"", video:"", pdf:"" , repository: "", presentation: ""},
        
        { num:14, title:"Оптимизация школьной библиотеки", author:"Мельникова Мария, Плужник Виктория", info:"Telegram-бот для автоматизации учёта выдачи и возврата учебников в школьной библиотеке.", link:"https://t.me/library192_bot", photo:"", video:"", pdf:"" , repository: "https://github.com/pluzhnikvr03/School_project?", presentation: ""},
        
        { num:15, title:"ТГ-бот для управления задачами и формирования полезных привычек", author:"Петрушин Лука", info:"Тг-бот-помощник для организации ежедневных задач и отслеживания полезных привычек.", link:"https://t.me/TaskMasterHelper3274Bot", photo:"", video:"", pdf:"" , repository: "https://github.com/feelweakk/HabitBot", presentation: ""},
        
        { num:16, title:"Сайт с проектами 10В класса", author:"Попов Даниял", info:"Сайт для хранения и удобного просмотра всех проектов 10В класса 2025/26 года с привидением всех данных о проекте", link:"https://dan7-21.github.io/site/", photo:"", video:"", pdf:"" , repository: "", presentation: ""},
        
        { num:17, title:"Распознавание особей птиц по голосу", author:"Романов Иван, Тарасов Алексей", info:" Программа для распознавания конкретных особей птиц по голосу.", link:"", photo:"", video:"", pdf:"", repository: "https://github.com/AlexeyTheWarthunder/bird_voice_recognition", presentation: "" },
        
        { num:18, title:"ТГ бот “Расчет параметров орбит планет в системе с одной звездой”", author:"Садовский Алексей", info:"В современном мире астрономии и астрофизики людям часто приходитсявыполнять различные расчеты связанные с движением планет и других небесных тел. Одной из таких задач является вычисление параметров орбит эти расчеты помогают определить большую полуось, орбитальную скорость и константу Кеплера для данной системы звезды. Однако вычисление параметров орбит вручную может быть достаточно сложным и муторным, особенно для школьников,которые только начинают изучать физику и астрономию. Не всегда удобно всегда использовать формулы и выполнять расчеты самостоятельно. Кроме того,на данный момент подобных программ не существует. Боты в мессенджере Telegram - удобное современное и всем доступное средство обмена информацией, организации процессов.В данной работе рассматривается создание telegram-бота дляпроизведения расчетов.Такой бот позволит пользователю ввести данные ибыстро получить результат.", link:"https://t.me/pframetersexoplanetbot", photo:"", video:"", pdf:"" , repository: "https://github.com/ASadovs1488/parametrs-orbits-planets/tree/main", presentation: ""},
        
        { num:19, title:"Действия В. И. Ленина в первый год гражданской войны", author:"Тонтоев  Саян", info:"Наша главная цель - не просто рассказать о событиях прошлого, а создать современный и увлекательный инструмент, который поможет по-новому взглянуть на историю. Таким инструментом стал наш Telegram-бот. Через формат викторины мы хотим сделать изучение сложного периода Гражданской войны интересным и значимым для каждого пользователя. ", link:"https://t.me/questleninbot", photo:"", video:"", pdf:"" , repository: "", presentation: ""},
       
        { num:20, title:"ТГ-бот 'напоминалка'", author:"Черкашин Артем", info:"", link:"https://t.me/rem1nder96_bot", photo:"", video:"", pdf:"" , repository: "https://github.com/hellogromi/reminder_tg_bot", presentation: "" }
    ];   

   
    const mainScreen = document.getElementById("mainScreen");
    const projectScreen = document.getElementById("projectScreen");
    const projectContent = document.getElementById("projectContent");
    const buttonsGrid = document.getElementById("buttonsGrid");
  
    for (let i = 0; i < projects.length; i++) {
        const p = projects[i];
        const btn = document.createElement("button");
        btn.className = "project-btn";
      
      
        if (p.title && p.title !== "") {
            btn.textContent = p.num + ". " + p.title;
        } else {
            btn.textContent = "Проект №" + p.num;
        }
        
        btn.onclick = (function(projectData) {
            return function() { showProject(projectData); };
        })(p);
        buttonsGrid.appendChild(btn);
    }

    
    window.showMain = function() {
        mainScreen.style.display = "block";
        projectScreen.style.display = "none";
    };

   
    function showProject(proj) {
        
      
        let projectTitle = proj.title;
        if (!projectTitle || projectTitle === "") {
            projectTitle = "Проект №" + proj.num;
        }
        
        
        let authorName = proj.author;
        if (!authorName || authorName === "") {
            authorName = "Не указан";
        }
        
       
        let projectInfo = proj.info;
        if (!projectInfo || projectInfo === "") {
            projectInfo = "Информация о проекте будет добавлена позже.";
        }
        
        
        let mediaHtml = "";
        
        
        if (proj.video && proj.video !== "") {
            
            mediaHtml = `
                <div class="video-container">
                    <div class="media-label"> Видеопрезентация проекта</div>
                    <video controls>
                        <source src="${proj.video}" type="video/mp4">
                        Ваш браузер не поддерживает тег video.
                    </video>
                </div>
            `;
        }
       
        else if (proj.photo && proj.photo !== "") {
            
            mediaHtml = `
                <div class="photo">
                    <div class="media-label"> Изображение проекта</div>
                    <img src="${proj.photo}" alt="${projectTitle}">
                </div>
            `;
        }
       
        
        
        let linkHtml = "";
        if (proj.link && proj.link !== "") {
            linkHtml = `<a href="${proj.link}" target="_blank" class="link-btn"> Перейти на реализованный проект!</a>`;
        }
        
        
        let pdfHtml = "";
        if (proj.pdf && proj.pdf !== "") {
            pdfHtml = `<a href="${proj.pdf}" target="_blank" class="pdf-btn"> Полное описание (PDF)</a>`;
        }
       
        let repoHtml = "";
        if (proj.repository && proj.repository !== "") {
            repoHtml = `<a href="${proj.repository}" target="_blank" class="repo-btn"> Репозиторий проекта</a>`;
        }


        let presentationHtml = "";
        if (proj.presentation && proj.presentation !== "") {
    presentationHtml = `<a href="${proj.presentation}" target="_blank" class="presentation-btn"> Презентация (PDF)</a>`;
        }
        
      
  const buttonsRow = `
    <div class="buttons-row">
        ${linkHtml}
        ${repoHtml}
        ${pdfHtml}
        ${presentationHtml}
    </div>
`;
        const fullHtml = `
            <h2 style="margin-top:0;">${projectTitle}</h2>
            <div class="info-box"><strong> Автор:</strong> ${authorName}</div>
            ${mediaHtml}
            <div class="info-box">
                <strong>Общая информация:</strong><br>
                ${projectInfo}
            </div>
            ${buttonsRow}
        `;
        
        projectContent.innerHTML = fullHtml;
        
        mainScreen.style.display = "none";
        projectScreen.style.display = "block";
    }
</script>
</body>
</html>
